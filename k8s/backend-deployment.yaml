apiVersion: apps/v1
kind: Deployment
metadata:
  name: prove-backend
  namespace: prove
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prove-backend
  template:
    metadata:
      labels:
        app: prove-backend
    spec:
      terminationGracePeriodSeconds: 10
      initContainers:
        - name: alembic-migrate
          image: ghcr.io/team-peenoo/prove-backend:latest
          imagePullPolicy: Always
          command: ["alembic", "upgrade", "head"]
          workingDir: /app
          envFrom:
            - secretRef:
                name: prove-backend-secret
      containers:
        - name: prove-backend
          image: ghcr.io/team-peenoo/prove-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: prove-backend-secret
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
